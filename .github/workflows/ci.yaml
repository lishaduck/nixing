name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
  schedule:
    - cron: "0 9 * * 1"
      timezone: America/Chicago
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.host }}
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - host: nixos
            os: ubuntu-latest
            output: nixosConfigurations
          - host: macOSs-Virtual-Machine
            os: macos-latest
            output: darwinConfigurations

    steps:
      - name: 📚 Git checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: ❄️ Set up Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
      - name: 🔧 Build ${{ matrix.host }}
        run: nix build .#${{ matrix.output }}.${{ matrix.host }}.system

  zizmor:
    name: Run zizmor
    timeout-minutes: 1
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🌈 Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
